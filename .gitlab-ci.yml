stages:
  - lint
  - test
  - build
  - deploy

default:
  image: ghcr.io/astral-sh/uv:python3.10-bookworm-slim
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .cache/uv
  before_script:
    - uv sync --frozen

lint:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

test:
  stage: test
  script:
    - uv run pytest -v
    - uv run noaa-temp-analyzer --station 10468099999 --year 2023 --text-only

build-package:
  stage: build
  script:
    - uv build
  artifacts:
    paths:
      - dist/
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'

deploy-testpypi:
  stage: deploy
  needs:
    - build-package
  script:
    - uv run --with twine twine upload --repository testpypi dist/* -u __token__ -p "$TESTPYPI_TOKEN"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?\d+\.\d+\.\d+$/'
